<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Clarity</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Camera (full screen) ── -->
  <div class="camera-view">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" hidden></canvas>

    <!-- Scan line (visible while analyzing) -->
    <div id="scanLine" class="scan-line"></div>

    <!-- Top HUD bar -->
    <div class="hud-top">
      <div class="hud-brand">
        <div class="hud-brand-dot"></div>
        CLARITY
      </div>
      <div class="hud-right">
        <span id="modeLabel" class="hud-mode-label">ENTORNO</span>
        <div id="statusDot" class="hud-status-dot"></div>
      </div>
    </div>

    <!-- Person recognition badge (top center) -->
    <div id="personBadge" class="person-badge">
      <span class="person-badge-icon">👤</span>
      <span id="personBadgeName"></span>
    </div>

  </div>

  <!-- ── Description overlay (fixed, above control bar) ── -->
  <div class="hud-description">
    <div id="waveIndicator" class="wave-indicator">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <div id="responseText" class="hud-text"></div>
  </div>

  <!-- ── Control bar (fixed bottom) ── -->
  <div class="control-bar">
    <!-- Mode pills -->
    <div class="mode-pills">
      <button class="mode-pill active" data-mode="glasses" onclick="setMode('glasses',this)">
        <span class="pill-icon">👁</span>
        <span class="pill-label">Entorno</span>
      </button>
      <button class="mode-pill" data-mode="read" onclick="setMode('read',this)">
        <span class="pill-icon">📖</span>
        <span class="pill-label">Leer</span>
      </button>
      <button class="mode-pill" data-mode="people" onclick="setMode('people',this)">
        <span class="pill-icon">👥</span>
        <span class="pill-label">Personas</span>
      </button>
    </div>

    <!-- Big start/stop button -->
    <button id="glassesBtn" class="btn-record" onclick="toggleGlasses()" aria-label="Iniciar lentes">
      <span id="glassesBtnIcon" class="btn-record-icon"></span>
    </button>

    <!-- Side actions -->
    <div class="side-actions">
      <button class="btn-side" onclick="openSocialPanel()" aria-label="Registro social">
        <span>🧠</span>
      </button>
      <button class="btn-side" onclick="openMemoryModal()" aria-label="Guardar persona">
        <span>💾</span>
      </button>
    </div>
  </div>

  <!-- ── Social panel ── -->
  <div id="socialPanel" class="panel-backdrop" onclick="panelBackdropClick(event,'socialPanel')">
    <div class="panel">
      <div class="panel-handle"></div>
      <div class="panel-header">
        <h2 class="panel-title">Registro Social</h2>
        <button class="panel-close" onclick="closeSocialPanel()">✕</button>
      </div>
      <div class="panel-tabs">
        <button class="tab-btn active" onclick="showTab('peopleTab',this)">Personas</button>
        <button class="tab-btn" onclick="showTab('historyTab',this)">Historial</button>
      </div>
      <div id="peopleTab" class="tab-content active">
        <div id="socialPeopleList" class="social-list">
          <p class="empty-msg">Nadie reconocido aún</p>
        </div>
      </div>
      <div id="historyTab" class="tab-content">
        <div id="socialHistoryList" class="social-list">
          <p class="empty-msg">Sin interacciones recientes</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Memory modal ── -->
  <div id="memoryModal" class="modal-backdrop" onclick="modalBackdropClick(event)">
    <div class="modal">
      <h2 class="modal-title">Guardar persona</h2>
      <p class="modal-hint">Centra el rostro en cámara y escribe el nombre</p>
      <input id="personNameInput" class="modal-input" type="text" placeholder="Nombre" maxlength="50" />
      <button class="modal-submit" onclick="rememberPerson()">Guardar</button>
      <div id="peopleList" class="people-list"></div>
      <button class="modal-close-btn" onclick="closeMemoryModal()">Cerrar</button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
